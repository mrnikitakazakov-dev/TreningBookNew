# Профиль для продакшна
spring.profiles=prod

# PostgreSQL настройки (через переменные окружения)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA настройки для PostgreSQL
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Отключаем H2 консоль в продакшне
spring.h2.console.enabled=false

# Безопасность (пароль тренера через переменную окружения)
# Пользователь trainer будет создан в SecurityConfig, но пароль можно задать тут

# Логирование для продакшна (минимум информации)
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR