# Настройки сервера
server.port=8080

# Настройки базы данных H2
spring.datasource.url=jdbc:h2:file:./data/trainingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA настройки
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf настройки
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Логирование
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG

# Настройки для дебага (можно убрать в продакшне)
logging.level.org.springframework.security=DEBUG

# Настройки сессии (опционально)
server.servlet.session.timeout=30m



server.port=8080

# ===== PostgreSQL настройки =====
spring.datasource.url=jdbc:postgresql://localhost:5432/trainingdb
spring.datasource.username=trainer_user
spring.datasource.password=trainer_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA настройки для PostgreSQL
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Убираем H2 консоль (она больше не нужна)
# spring.h2.console.enabled=false

# Thymeleaf настройки
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Логирование
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE